<div class="menuContainer verticalScrollBarLight" data-ng-style="{width: MENU_SIZE + 'px'}">
	<div class="clearButton" data-ng-click="clearGrid()">CLEAR GRID</div>
	<div class="clearButton" data-ng-click="menuService.playing = !menuService.playing">{{menuService.playing ? 'PAUSE' : 'PLAY'}}</div>
	<div class="clearButton" data-ng-click="menuService.borders = !menuService.borders">{{menuService.borders ? 'ShowBorders' : 'hideBorders'}}</div>
	<div class="clearButton" data-ng-click="loadImageFile()">UPLOAD</div>


	<div class="growthTypeContainers">
		<div class="growthType"
		     data-ng-repeat="item in menuService.growthTypes"
		     data-ng-class="{active: item == menuService.activeGrowthType}"
		     data-ng-click="menuService.activeGrowthType = item"
			></div>

	</div>
	<div class="directionalControls" data-ng-show="menuService.activeGrowthType.index == 0">
		<i data-ng-if="item.class"
			data-ng-repeat="item in menuService.surroundingCell"
			data-ng-click="item.val = !item.val"
			class="fa {{item.val}}"
			data-ng-class="item.class"></i>
	</div>
	<div class="typeControls" data-ng-show="menuService.activeGrowthType.index == 1">
		<div>
			<span>BIRTH</span>
			<span data-ng-repeat="item in menuService.birthOptions">
			<input type="checkbox"
			       checklist-model="menuService.activeGrowthType.activeRule.birth"
			       data-checklist-value="item.id">
			</span>
			<br>
			<span>STAY ALIVE</span>
			<span data-ng-repeat="item in menuService.stayAliveOptions">
			<input type="checkbox"
			       checklist-model="menuService.activeGrowthType.activeRule.stayAlive"
			       data-checklist-value="item.id">
			</span>
		</div>
		<div class="ruleType"
		     data-ng-repeat="rule in menuService.activeGrowthType.rulesTemplates"
		     data-ng-click="menuService.activeGrowthType.activeRule = rule">{{rule.name}}
		</div>

	</div>


	<div slider
	     data-fixed-value="0"
	     data-slider-value="menuService.animationSpeed"
	     data-min-value="1"
	     data-max-value="10">
	</div>
	<input type="color" class="colorPicker" data-ng-change="recalculateColors()" data-ng-model="menuService.colorOne">
	<input type="color" class="colorPicker" data-ng-change="recalculateColors()" data-ng-model="menuService.colorTwo">



</div>
